name: Update War Data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update]

concurrency:
  group: update-war-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Refresh CoC token
        id: token
        env:
          COC_EMAIL: ${{ secrets.COC_EMAIL }}
          COC_PASSWORD: ${{ secrets.COC_PASSWORD }}
        run: |
          TOKEN=$(node scripts/refresh-token.js)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Fetch war data
        env:
          COC_TOKEN: ${{ steps.token.outputs.token }}
        run: npm run fetch

      - name: Fetch player data
        env:
          COC_TOKEN: ${{ steps.token.outputs.token }}
        run: npm run fetch-players

      - name: Compute CWL ranking
        run: npm run compute-cwl

      - name: Commit updated data
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          git config user.name "Fernando"
          git config user.email "fernandoribeiro.com@gmail.com"
          git add data/wars.json data/players.json data/absences.json data/cwl-ranking.json
          if git diff --staged --quiet; then
            echo "No data changes, skipping commit."
            exit 0
          fi
          git commit -m "auto update $(date -u '+%Y-%m-%dT%H:%M')Z"
          if [ $((RUN_NUMBER % 3)) -eq 0 ]; then
            git push origin HEAD:main
            echo "Pushed to main (Vercel deploy triggered)"
          else
            echo "Skipping main push (run $RUN_NUMBER, next deploy at run $((RUN_NUMBER + 3 - RUN_NUMBER % 3)))"
          fi
