name: Update War Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: update-war-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Refresh CoC token
        id: token
        env:
          COC_EMAIL: ${{ secrets.COC_EMAIL }}
          COC_PASSWORD: ${{ secrets.COC_PASSWORD }}
        run: |
          TOKEN=$(node scripts/refresh-token.js)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Fetch war data
        env:
          COC_TOKEN: ${{ steps.token.outputs.token }}
        run: npm run fetch

      - name: Fetch player data
        env:
          COC_TOKEN: ${{ steps.token.outputs.token }}
        run: npm run fetch-players

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wars.json data/players.json data/absences.json
          git diff --staged --quiet || (git commit -m "auto update $(date -u '+%Y-%m-%dT%H:%M')Z" && git push origin HEAD:master)
