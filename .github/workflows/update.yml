name: Update War Data

on:
  schedule:
    - cron: '*/5 * * * *'  # a cada 5 minutos
  workflow_dispatch:      # permite rodar manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch war data
        env:
          COC_TOKEN: ${{ secrets.COC_TOKEN }}
        run: npm run fetch

      - name: Fetch player data
        env:
          COC_TOKEN: ${{ secrets.COC_TOKEN }}
        run: npm run fetch-players

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wars.json data/players.json
          git diff --staged --quiet || git commit -m "chore: update war and player data $(date -u +'%Y-%m-%d')"
          git push origin master
